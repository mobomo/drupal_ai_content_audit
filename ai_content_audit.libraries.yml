  dependencies:
    - core/drupal
    - core/drupal.ajax
    - core/once
    - ai_content_audit/design-tokens

technical-audit-tab:
  version: 1.x
  css:
    component:
      css/ai-technical-audit-tab.css: {}
  js:
    js/ai-technical-audit-tab.js: {}
