# Library architecture:
# - design-tokens (css.base) loads before all css.component libraries.
# - All --airo-* tokens in component CSS resolve through design-tokens.css.
# - No library declares a gin: dependency — theme coupling is handled at
#   runtime via hook_page_attachments_alter() which conditionally attaches
#   ai_content_audit/airo-panel-gin-shim only when Gin is the active admin theme.

# Gin-exclusive shim — only attached conditionally via hook_page_attachments_alter()
# when Gin is the active admin theme. The base airo-panel library is fully
# theme-agnostic and does NOT depend on this library.
airo-panel-gin-shim:
  version: 1.x
  css:
    component:
      css/ai-airo-panel-gin-shim.css: {}
  dependencies:
    - ai_content_audit/design-tokens

assessment-panel:
  version: 1.x
  css:
    component:
      css/ai-assessment-panel.css: {}

# G10: 'base' group ensures design-tokens CSS loads before all 'component' CSS.
# Drupal CSS weight: theme < base < layout < component < state < overrides.
design-tokens:
  version: 1.x
  css:
    base:
      css/ai-design-tokens.css: {}

# G5: core/drupal.ajax provides Drupal.ajax() used by the AJAX widget refresh.
# G10: design-tokens declared so --airo-* vars resolve before widget CSS runs.
inline-widget:
  version: 1.x
  css:
    component:
      css/ai-inline-score-widget.css: {}
  js:
    js/ai-inline-score-widget.js: {}
  dependencies:
    - core/drupal
    - core/drupal.ajax
    - core/once
    - ai_content_audit/design-tokens

# G10: G4 sticky footer CSS is appended to ai-airo-panel.css — no new library.
# TAB CSS NOTE: The tab bar (`<ul class="tabs tabs--primary">`) is styled by the GIN theme's
# `gin/tabs` library (`dist/css/components/tabs.css`). That library is automatically loaded on
# every admin page via `gin/base` → `gin/tabs` when GIN is the active admin theme. No explicit
# dependency on `gin/tabs` is added here to avoid a hard module→theme coupling; the off-canvas
# drawer is always rendered inside the admin context where `gin/base` is attached.
airo-panel:
  version: 1.x
  css:
    component:
      css/ai-airo-panel.css: {}
  js:
    js/ai-airo-panel.js: {}
  dependencies:
    - core/drupal
    - core/drupal.ajax
    - core/drupal.dialog.off_canvas
    - core/once
    - ai_content_audit/design-tokens
    # All four tab panes are rendered at panel-open time, so their CSS and JS
    # must be present in the initial page load — not loaded lazily per request.
    - ai_content_audit/score-tab
    - ai_content_audit/action-items-tab
    - ai_content_audit/technical-audit-tab
    - ai_content_audit/preview-tab

score-tab:
  version: 1.x
  css:
    component:
      css/ai-score-tab.css: {}
  js:
    js/ai-score-tab.js: {}
  dependencies:
    - core/drupal
    - core/drupal.ajax
    - core/once
    - core/once
    - ai_content_audit/design-tokens

action-items-tab:
  version: 1.x
  css:
    component:
      css/ai-action-items-tab.css: {}
  js:
    js/ai-action-items-tab.js: {}
  dependencies:
    - core/drupal
    - core/drupal.ajax
    - core/once
    - ai_content_audit/design-tokens

technical-audit-tab:
