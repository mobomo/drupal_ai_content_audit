services:
  ai_content_audit_scoring.score_meta:
    class: Drupal\ai_content_audit_scoring\Service\ScoreMetaBuilder
    arguments: ['@string_translation']

  ai_content_audit_scoring.airo_action_item_command:
    class: Drupal\ai_content_audit_scoring\Service\AiroActionItemCommand
    arguments:
      - '@ai_content_audit.assessment_repository'
      - '@current_user'
      - '@datetime.time'

  ai_content_audit_scoring.airo_inline_score_widget_builder:
    class: Drupal\ai_content_audit_scoring\Service\AiroInlineScoreWidgetBuilder
    arguments:
      - '@ai_content_audit.assessment_repository'

  ai_content_audit_scoring.filesystem_audit:
    class: Drupal\ai_content_audit_scoring\Service\FilesystemAuditService
    arguments:
      - '@logger.channel.ai_content_audit'
      - '@cache.data'
      - '@ai_content_audit.audit_check_manager'
      - '@datetime.time'

  ai_content_audit.airo_panel_tab_builder:
    class: Drupal\ai_content_audit\Service\AiroPanelTabBuilder
    arguments:
      - '@ai_content_audit.assessment_repository'
      - '@ai_content_audit.technical_audit'
      - '@request_stack'

  ai_content_audit_scoring.airo_panel_tab.score:
    class: Drupal\ai_content_audit\AiroPanel\Tab\ScoreTab
    arguments:
      - '@ai_content_audit.airo_panel_tab_builder'
      - '@ai_content_audit.assessment_repository'
    tags:
      - { name: ai_content_audit.airo_panel_tab }

  ai_content_audit_scoring.airo_panel_tab.action_items:
    class: Drupal\ai_content_audit\AiroPanel\Tab\ActionItemsTab
    arguments:
      - '@ai_content_audit.airo_panel_tab_builder'
    tags:
      - { name: ai_content_audit.airo_panel_tab }

  ai_content_audit_scoring.airo_panel_tab.technical_audit:
    class: Drupal\ai_content_audit\AiroPanel\Tab\TechnicalAuditTab
    arguments:
      - '@ai_content_audit.airo_panel_tab_builder'
    tags:
      - { name: ai_content_audit.airo_panel_tab }

  Drupal\ai_content_audit_scoring\Hook\ScoringThemeHooks:
    arguments:
      - '@ai_content_audit_scoring.score_meta'
      - '@date.formatter'
      - '@url_generator'
      - '@module_handler'
