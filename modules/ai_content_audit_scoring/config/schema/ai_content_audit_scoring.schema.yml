# Config schema for the AIRO Scoring settings config object.
ai_content_audit_scoring.settings:
  type: config_object
  label: 'AIRO Scoring settings'
  mapping:
    enable_on_save:
      type: boolean
      label: 'Assess on node save'
    enable_history:
      type: boolean
      label: 'Enable assessment history'
    node_types:
      type: sequence
      label: 'Node types to assess'
      sequence:
        type: string
        label: 'Node type'
    max_assessments_per_node:
      type: integer
      label: 'Maximum assessments to keep per node'
    render_mode:
      type: string
      label: 'Content render mode'
    disabled_checks:
      type: sequence
      label: 'Disabled audit check plugin IDs'
      sequence:
        type: string
        label: 'Audit check plugin ID'
    prompts:
      type: mapping
      label: 'Scoring prompt settings'
      mapping:
        assessment_system_prompt:
          type: string
          label: 'Assessment system prompt'
          constraints:
            ConfigExists:
              prefix: 'ai.ai_prompt.'
        assessment_user_prompt:
          type: string
          label: 'Assessment user prompt'
          constraints:
            ConfigExists:
              prefix: 'ai.ai_prompt.'
