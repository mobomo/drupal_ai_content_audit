services:
  logger.channel.ai_content_audit:
    parent: logger.channel_base
    arguments: ['ai_content_audit']

  ai_content_audit.assessment_repository:
    class: Drupal\ai_content_audit\Repository\AiContentAssessmentRepository
    arguments:
      - '@entity_type.manager'

  ai_content_audit.extractor_manager:
    class: Drupal\ai_content_audit\Extractor\ContentExtractorManager
    arguments:
      - '@container.namespaces'
      - '@cache.discovery'
      - '@module_handler'

  ai_content_audit.assessment_service:
    class: Drupal\ai_content_audit\Service\AiAssessmentService
    arguments:
      - '@ai.provider'
      - '@ai_content_audit.extractor_manager'
      - '@logger.factory'
      - '@config.factory'
      - '@entity_type.manager'
      - '@ai_content_audit.prompt_resolver'
      - '@ai_content_audit.provider_model_choices'

  ai_content_audit.prompt_resolver:
    class: Drupal\ai_content_audit\Service\AiContentAuditPromptResolver
    arguments:
      - '@config.factory'
      - '@entity_type.manager'

  ai_content_audit.technical_audit:
    class: Drupal\ai_content_audit\Service\TechnicalAuditService
    arguments:
      - '@http_client'
      - '@config.factory'
      - '@logger.channel.ai_content_audit'
      - '@cache.data'
      - '@request_stack'
      - '@module_handler'
      - '@entity_type.manager'
      - '@ai_content_audit.audit_check_manager'

  ai_content_audit.filesystem_audit:
    class: Drupal\ai_content_audit\Service\FilesystemAuditService
    arguments:
      - '@logger.channel.ai_content_audit'
      - '@cache.data'
      - '@ai_content_audit.audit_check_manager'
      - '@datetime.time'

  ai_content_audit.audit_check_manager:
    class: Drupal\ai_content_audit\Plugin\Manager\AuditCheckManager
    arguments:
      - '@container.namespaces'
      - '@cache.discovery'
      - '@module_handler'
      - '@config.factory'

  ai_content_audit.html_fetch:
    class: Drupal\ai_content_audit\Service\HtmlFetchService
    arguments:
      - '@http_client'
      - '@request_stack'

  ai_content_audit.provider_model_choices:
    class: Drupal\ai_content_audit\Service\ProviderModelChoices
    arguments:
      - '@ai.provider'

  ai_content_audit.ai_response_subscriber:
    class: Drupal\ai_content_audit\EventSubscriber\AiResponseSubscriber
    arguments:
      - '@logger.factory'
    tags:
      - { name: event_subscriber }

  ai_content_audit.airo_analysis_route_subscriber:
    class: Drupal\ai_content_audit\EventSubscriber\AiroAnalysisRouteSubscriber
    arguments:
      - '@ai_content_audit.node_layout_builder_detector'
      - '@config.factory'
    tags:
      - { name: event_subscriber }

  ai_content_audit.airo_entity_form_controller:
    class: Drupal\ai_content_audit\Controller\AiroEntityFormController
    arguments:
      - '@http_kernel.controller.argument_resolver'
      - '@form_builder'
      - '@entity_type.manager'
      - '@ai_content_audit.node_layout_builder_detector'
      - '@ai_content_audit.airo_analysis_panel_builder'

  Drupal\ai_content_audit\Controller\AiroEntityFormController: '@ai_content_audit.airo_entity_form_controller'

  ai_content_audit.airo_analysis_layout_route_enhancer:
    class: Drupal\ai_content_audit\Routing\AiroAnalysisLayoutRouteEnhancer
    arguments:
      - '@ai_content_audit.node_layout_builder_detector'
      - '@layout_builder.param_converter'
      - '@layout_builder.tempstore_repository'
      - '@config.factory'
    tags:
      - { name: route_enhancer, priority: 4900 }

  ai_content_audit.score_meta:
    class: Drupal\ai_content_audit\Service\ScoreMetaBuilder
    arguments: ['@string_translation']

  ai_content_audit.airo_panel_controller:
    class: Drupal\ai_content_audit\Controller\AiroPanelController
    factory: ['Drupal\ai_content_audit\Controller\AiroPanelController', 'create']
    arguments: ['@service_container']

  ai_content_audit.airo_panel_tab_builder:
    class: Drupal\ai_content_audit\Service\AiroPanelTabBuilder
    arguments:
      - '@ai_content_audit.assessment_repository'
      - '@ai_content_audit.technical_audit'
      - '@ai.provider'
      - '@tempstore.private'
      - '@ai_content_audit.provider_model_choices'
      - '@request_stack'
      - '@current_user'

  ai_content_audit.airo_node_revision_resolver:
    class: Drupal\ai_content_audit\Service\AiroNodeRevisionResolver
    arguments:
      - '@entity_type.manager'
      - '@current_user'

  ai_content_audit.airo_preview_chat:
    class: Drupal\ai_content_audit\Service\AiroPreviewChat
    arguments:
      - '@ai.provider'
      - '@ai_content_audit.extractor_manager'
      - '@ai_content_audit.provider_model_choices'
      - '@tempstore.private'
      - '@ai_content_audit.prompt_resolver'
      - '@current_user'
      - '@logger.channel.ai_content_audit'

  ai_content_audit.airo_action_item_command:
    class: Drupal\ai_content_audit\Service\AiroActionItemCommand
    arguments:
      - '@ai_content_audit.assessment_repository'
      - '@current_user'
      - '@datetime.time'

  ai_content_audit.airo_inline_score_widget_builder:
    class: Drupal\ai_content_audit\Service\AiroInlineScoreWidgetBuilder
    arguments:
      - '@ai_content_audit.assessment_repository'

  ai_content_audit.node_layout_builder_detector:
    class: Drupal\ai_content_audit\Service\NodeLayoutBuilderDetector
    arguments:
      - '@entity_type.manager'

  ai_content_audit.airo_analysis_panel_builder:
    class: Drupal\ai_content_audit\Service\AiroAnalysisPanelBuilder
    arguments:
      - '@ai_content_audit.assessment_repository'
      - '@ai_content_audit.airo_panel_tab_builder'
      - '@ai_content_audit.audit_check_manager'
      - '@ai_content_audit.technical_audit'
      - '@module_handler'

  ai_content_audit.airo_node_analysis_form_alterer:
    class: Drupal\ai_content_audit\Service\AiroNodeAnalysisFormAlterer
    arguments:
      - '@ai_content_audit.airo_analysis_panel_builder'
      - '@current_route_match'
      - '@ai_content_audit.node_layout_builder_detector'
      - '@ai_content_audit.airo_gin_layout_builder_adapter'
      - '@string_translation'

  ai_content_audit.airo_gin_layout_builder_adapter:
    class: Drupal\ai_content_audit\Service\AiroGinLayoutBuilderAdapter
    arguments:
      - '@config.factory'

  ai_content_audit.lifecycle:
    class: Drupal\ai_content_audit\Service\AiContentAuditLifecycle
    arguments:
      - '@config.factory'
      - '@entity_type.manager'
      - '@queue'
      - '@database'
      - '@logger.channel.ai_content_audit'

  Drupal\ai_content_audit\Hook\AiContentAuditThemeHooks:
    arguments:
      - '@ai_content_audit.score_meta'
      - '@date.formatter'
      - '@url_generator'

  Drupal\ai_content_audit\Hook\AiContentAuditEntityHooks:
    arguments: ['@ai_content_audit.lifecycle']

  Drupal\ai_content_audit\Hook\AiContentAuditCronHooks:
    arguments: ['@ai_content_audit.lifecycle']

  Drupal\ai_content_audit\Hook\AiContentAuditPageHooks:
    arguments:
      - '@current_route_match'
      - '@ai_content_audit.node_layout_builder_detector'
      - '@config.factory'

  Drupal\ai_content_audit\Hook\AiContentAuditFormHooks:
    arguments:
      - '@ai_content_audit.airo_node_analysis_form_alterer'
      - '@current_route_match'

  Drupal\ai_content_audit\Hook\AiContentAuditAiHooks:
    class: Drupal\ai_content_audit\Hook\AiContentAuditAiHooks
