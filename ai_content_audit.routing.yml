# Collection page — lists all AI Content Assessment entities.
entity.ai_content_assessment.collection:
  path: '/admin/content/ai-assessments'
  defaults:
    _entity_list: 'ai_content_assessment'
    _title: 'AI Content Assessments'
  requirements:
    _permission: 'view ai content assessment+administer ai content audit'
  options:
    _admin_route: TRUE

# Canonical view page for a single assessment.
entity.ai_content_assessment.canonical:
  path: '/admin/content/ai-assessments/{ai_content_assessment}'
  defaults:
    _entity_view: 'ai_content_assessment'
    _title_callback: '\Drupal\Core\Entity\Controller\EntityController::title'
  requirements:
    _entity_access: 'ai_content_assessment.view'
  options:
    _admin_route: TRUE

# Delete confirmation form.
entity.ai_content_assessment.delete_form:
  path: '/admin/content/ai-assessments/{ai_content_assessment}/delete'
  defaults:
    _entity_form: 'ai_content_assessment.delete'
    _title: 'Delete AI Content Assessment'
  requirements:
    _entity_access: 'ai_content_assessment.delete'
  options:
    _admin_route: TRUE

ai_content_audit.panel.open:
  path: '/admin/ai-content-audit/panel/{node}'
  defaults:
    _controller: '\Drupal\ai_content_audit\Controller\AiroPanelController::openPanel'
    _title: 'AIRO Analysis'
  requirements:
    _permission: 'view ai content assessment+administer ai content audit'
    node: \d+
  options:
    _admin_route: TRUE
    parameters:
      node:
        type: entity:node

ai_content_audit.panel.assess:
  path: '/admin/ai-content-audit/panel/{node}/assess'
  defaults:
    _controller: '\Drupal\ai_content_audit\Controller\AiroPanelController::assessNode'
    _title: 'Assess Node'
  requirements:
    _permission: 'run ai content assessment+administer ai content audit'
    node: \d+
  methods: [POST]
  options:
    _admin_route: TRUE
    parameters:
      node:
        type: entity:node

