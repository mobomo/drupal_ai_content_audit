# Collection page — lists all AI Content Assessment entities.
entity.ai_content_assessment.collection:
  path: '/admin/content/ai-assessments'
  defaults:
    _entity_list: 'ai_content_assessment'
    _title: 'AI Content Assessments'
  requirements:
    _permission: 'view ai content assessment+administer ai content audit'
  options:
    _admin_route: TRUE

# Canonical view page for a single assessment.
entity.ai_content_assessment.canonical:
  path: '/admin/content/ai-assessments/{ai_content_assessment}'
  defaults:
    _entity_view: 'ai_content_assessment'
    _title_callback: '\Drupal\Core\Entity\Controller\EntityController::title'
  requirements:
    _entity_access: 'ai_content_assessment.view'
  options:
    _admin_route: TRUE

# Delete confirmation form.
entity.ai_content_assessment.delete_form:
  path: '/admin/content/ai-assessments/{ai_content_assessment}/delete'
  defaults:
    _entity_form: 'ai_content_assessment.delete'
    _title: 'Delete AI Content Assessment'
  requirements:
    _entity_access: 'ai_content_assessment.delete'
  options:
    _admin_route: TRUE

ai_content_audit.panel.open:
  path: '/admin/ai-content-audit/panel/{node}'
  defaults:
    _controller: '\Drupal\ai_content_audit\Controller\AiroPanelController::openPanel'
    _title: 'AIRO Analysis'
  requirements:
    _permission: 'view ai content assessment+administer ai content audit'
    node: \d+
  options:
    _admin_route: TRUE
    parameters:
      node:
        type: entity:node

ai_content_audit.panel.assess:
  path: '/admin/ai-content-audit/panel/{node}/assess'
  defaults:
    _controller: '\Drupal\ai_content_audit\Controller\AiroPanelController::assessNode'
    _title: 'Assess Node'
  requirements:
    _permission: 'run ai content assessment+administer ai content audit'
    node: \d+
  methods: [POST]
  options:
    _admin_route: TRUE
    parameters:
      node:
        type: entity:node

ai_content_audit.panel.status:
  path: '/admin/ai-content-audit/status/{node}'
  defaults:
    _controller: '\Drupal\ai_content_audit\Controller\AiroPanelController::assessmentStatus'
    _title: 'Assessment Status'
  requirements:
    _permission: 'view ai content assessment+administer ai content audit'
    node: \d+
  options:
    _admin_route: TRUE
    parameters:
      node:
        type: entity:node

# Note: the four per-tab AJAX routes (score-tab, action-items-tab,
# technical-audit-tab, preview-tab) have been removed. All tab panes are
# rendered server-side at panel-open time; tab switching is pure JS show/hide.

# G5: Widget refresh — returns an AjaxResponse with ReplaceCommand so the
# inline score widget can be swapped without a full page reload.
ai_content_audit.widget.refresh:
  path: '/admin/ai-content-audit/widget/{node}/refresh'
  defaults:
    _controller: '\Drupal\ai_content_audit\Controller\AiroPanelController::refreshWidget'
    _title: 'Widget Refresh'
    _format: 'json'
  requirements:
    _permission: 'view ai content assessment+administer ai content audit'
    node: \d+
  options:
    _admin_route: TRUE
    parameters:
      node:
        type: entity:node

# AIRO Analysis workspace — node tab with main content + side panel.
ai_content_audit.node.airo_analysis:
  path: '/node/{node}/airo-analysis'
  defaults:
    _entity_form: 'node.edit'
    _controller: 'Drupal\ai_content_audit\Controller\AiroEntityFormController::getContentResult'
    _title: 'AIRO Analysis'
  requirements:
    _permission: 'view ai content assessment+administer ai content audit'
    _custom_access: '\Drupal\ai_content_audit\Controller\AiroNodeAnalysisController::access'
    node: \d+
  options:
    parameters:
      node:
        type: entity:node

ai_content_audit.node.airo_analysis_panel_refresh:
  path: '/node/{node}/airo-analysis/panel-refresh'
  defaults:
    _controller: '\Drupal\ai_content_audit\Controller\AiroNodeAnalysisController::panelRefresh'
  requirements:
    _permission: 'view ai content assessment+administer ai content audit'
    _custom_access: '\Drupal\ai_content_audit\Controller\AiroNodeAnalysisController::access'
    node: \d+
  methods: [GET]
  options:
    _admin_route: FALSE
    parameters:
      node:
        type: entity:node

# Node assessment history tab — local task on node canonical.
ai_content_audit.node.assessment_history:
  path: '/node/{node}/ai-assessment'
  defaults:
    _controller: '\Drupal\ai_content_audit\Controller\AiAssessmentController::history'
    _title: 'AI Assessment History'
  requirements:
    _permission: 'view ai content assessment+administer ai content audit'
    node: \d+
  options:
    _admin_route: FALSE

ai_content_audit.panel.actions_toggle:
  path: '/admin/ai-content-audit/panel/{node}/action-items/{item_id}/toggle'
  defaults:
    _controller: '\Drupal\ai_content_audit\Controller\AiroPanelController::toggleActionItem'
  requirements:
    _permission: 'run ai content assessment+administer ai content audit'
    node: \d+
  methods: [POST]
  options:
    _admin_route: TRUE
    parameters:
      node:
        type: entity:node

ai_content_audit.panel.preview_query:
  path: '/admin/ai-content-audit/panel/{node}/preview-query'
  defaults:
    _controller: '\Drupal\ai_content_audit\Controller\AiroPanelController::submitPreviewQuery'
  requirements:
    _permission: 'run ai content assessment+administer ai content audit'
    node: \d+
  methods: [POST]
  options:
    _admin_route: TRUE
    parameters:
      node:
        type: entity:node

# Full assessment report page — formatted view for a single AiContentAssessment entity.
ai_content_audit.assessment.report:
  path: '/admin/ai-content-audit/assessment/{ai_content_assessment}'
  defaults:
    _controller: '\Drupal\ai_content_audit\Controller\AiAssessmentController::report'
    _title_callback: '\Drupal\ai_content_audit\Controller\AiAssessmentController::reportTitle'
  requirements:
    _entity_access: 'ai_content_assessment.view'
    ai_content_assessment: \d+
  options:
    _admin_route: TRUE
    parameters:
      ai_content_assessment:
        type: entity:ai_content_assessment

# GET endpoint: returns all configured provider+model choices as JSON.
# Used as a Phase-2 stub for lazy-loading the model selector; not called
# from the UI in Phase 1 (the list is embedded server-side at panel-open time).
ai_content_audit.panel.available_models:
  path: '/admin/ai-content-audit/api/available-models'
  defaults:
    _controller: '\Drupal\ai_content_audit\Controller\AiroPanelController::listAvailableModels'
    _title: 'Available AI Models'
    _format: 'json'
  requirements:
    _permission: 'use any ai provider in airo+administer ai content audit'
  methods: [GET]
  options:
    _admin_route: TRUE

# Settings form.
ai_content_audit.settings:
  path: '/admin/config/ai/content-audit'
  defaults:
    _form: '\Drupal\ai_content_audit\Form\SettingsForm'
    _title: 'AI Content Audit Settings'
  requirements:
    _permission: 'administer ai content audit'
  options:
    _admin_route: TRUE
