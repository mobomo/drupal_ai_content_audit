# Config schema for the AI Content Audit settings config object.
# NOTE: No schema entry is needed for the content entity type itself.
ai_content_audit.settings:
  type: config_object
  label: 'AI Content Audit settings'
  mapping:
    max_chars_per_request:
      type: integer
      label: 'Max characters per preview request'
    default_provider_model:
      type: string
      label: 'Default AI provider/model simple option'
    prompts:
      type: mapping
      label: 'Prompts settings'
      mapping:
        preview_system_prompt:
          type: string
          label: 'Preview system prompt'
          constraints:
            ConfigExists:
              prefix: 'ai.ai_prompt.'
        preview_user_prompt:
          type: string
          label: 'Preview user prompt'
          constraints:
            ConfigExists:
              prefix: 'ai.ai_prompt.'
